# TrussC API Definition
# Single source of truth for all TrussC API documentation
#
# Used to generate:
#   - trusssketch-api.js (autocomplete/reference)
#   - REFERENCE.md
#   - API_QUICK_REFERENCE.md (future)
#   - TrussC_vs_openFrameworks.md mapping (future)
#   - for-of-users.html tables (future)

categories:
  # ==========================================================================
  # Lifecycle
  # ==========================================================================
  - id: lifecycle
    name: "Lifecycle"
    name_ja: "ライフサイクル"
    name_ko: "라이프사이클"
    functions:
      - name: setup
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called once at start"
        description_ja: "開始時に一度呼ばれる"
        description_ko: "시작 시 한 번 호출됨"
        sketch: true
        snippet: "void setup() {\n\t$0\n}"

      - name: update
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called every frame before draw"
        description_ja: "毎フレーム、drawの前に呼ばれる"
        description_ko: "매 프레임 draw 이전에 호출됨"
        sketch: true
        snippet: "void update() {\n\t$0\n}"

      - name: draw
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called every frame after update"
        description_ja: "毎フレーム、updateの後に呼ばれる"
        description_ko: "매 프레임 update 이후에 호출됨"
        sketch: true
        snippet: "void draw() {\n\t$0\n}"

      - name: cleanup
        return: "void"
        signatures:
          - params: ""
            params_simple: ""
        description: "Called once before exit (optional user callback for cleanup)"
        description_ja: "終了前に一度呼ばれる（オプショナルなクリーンアップコールバック）"
        description_ko: "종료 직전 한 번 호출됨 (선택적 정리용 콜백)"
        sketch: false
        snippet: "void cleanup() {\n\t$0\n}"

      - name: runApp
        return: "int"
        signatures:
          - params: "const WindowSettings& settings = WindowSettings()"
            params_simple: "settings"
        description: "Start the application main loop. Called from main()"
        description_ja: "アプリケーションのメインループを開始。main()から呼ぶ"
        description_ko: "어플리케이션 메인 루프 시작. main()에서 호출"
        sketch: false
        snippet: "runApp(${1:settings})"

  # ==========================================================================
  # Events
  # ==========================================================================
  - id: events
    name: "Events"
    name_ja: "イベント"
    name_ko: "이벤트"
    functions:
      - name: mousePressed
