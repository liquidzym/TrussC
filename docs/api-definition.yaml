        description_ko: "내적"
        snippet: "dot(${1:v})"
      - name: cross
        return: float
        signatures:
          - params: "Vec2 v"
        description: "Cross product (z component)"
        description_ja: "外積（z成分）"
        description_ko: "외적 (z 성분)"
        snippet: "cross(${1:v})"
